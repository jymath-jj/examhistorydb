<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실전테스트 분석 조회</title>
  <style>
    :root{--bg:#f5f6f8;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--primary:#2563eb;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:16px;--red:#dc2626;--green:#059669;--orange:#d97706}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}header{background:#111827;color:#fff;padding:28px 20px}.wrap{width:min(1180px,calc(100% - 32px));margin:0 auto}h1{margin:0;font-size:26px;letter-spacing:-.03em}header p{margin:8px 0 0;color:#d1d5db;font-size:14px}.toolbar{margin:22px auto;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:grid;grid-template-columns:1.4fr .8fr .8fr .8fr auto;gap:10px;align-items:end}label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:800}input,select,button{width:100%;height:40px;border:1px solid var(--border);border-radius:10px;background:#fff;padding:0 12px;font-size:14px;color:var(--text)}button{border:none;background:var(--primary);color:#fff;font-weight:800;cursor:pointer;white-space:nowrap}button.secondary{background:#374151}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}.stat .label{font-size:12px;color:var(--muted);font-weight:800}.stat .value{font-size:24px;font-weight:900;margin-top:4px}.list{display:grid;gap:14px;padding-bottom:40px}.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card h2{margin:0;font-size:19px;letter-spacing:-.03em}.sub{margin-top:6px;color:var(--muted);font-size:13px}.badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}.badge{display:inline-flex;align-items:center;min-height:26px;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:800;background:#f3f4f6;color:#374151}.blue{background:#eff6ff;color:#1d4ed8}.red{background:#fef2f2;color:var(--red)}.green{background:#ecfdf5;color:var(--green)}.orange{background:#fff7ed;color:var(--orange)}.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}.box{background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:12px;min-height:76px}.box-title{font-size:12px;color:var(--muted);font-weight:900;margin-bottom:6px}.box-content{font-size:13px;line-height:1.55;white-space:pre-wrap}.actions{display:flex;gap:8px;margin-top:14px;justify-content:flex-end}.actions button,.actions a{width:auto;height:36px;border-radius:9px;padding:0 12px;font-size:13px;display:inline-flex;align-items:center;text-decoration:none;font-weight:800}.actions a{border:1px solid var(--border);background:#fff;color:var(--text)}.loading,.empty,.error{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;text-align:center;color:var(--muted);box-shadow:var(--shadow)}.error{color:var(--red)}.modal-backdrop{position:fixed;inset:0;background:rgba(17,24,39,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}.modal{width:min(920px,100%);max-height:88vh;overflow:auto;background:#fff;border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.25);padding:20px}.modal-header{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:14px}.modal h3{margin:0;font-size:20px}.close-btn{width:38px;height:38px;background:#f3f4f6;color:#111827;border-radius:50%;padding:0;flex:0 0 auto}.report{white-space:pre-wrap;line-height:1.6;font-size:14px;background:#f9fafb;border:1px solid var(--border);border-radius:12px;padding:14px}@media(max-width:900px){.toolbar{grid-template-columns:1fr 1fr}.stats{grid-template-columns:1fr 1fr}.summary-grid{grid-template-columns:1fr}}@media(max-width:560px){.toolbar,.stats{grid-template-columns:1fr}h1{font-size:22px}}
  </style>
</head>
<body>
  <header><div class="wrap"><h1>실전테스트 분석 조회</h1><p>PDF · CSV · 손풀이 · 활용기록 통합 조회</p></div></header>
  <main class="wrap">
    <section class="toolbar" style="grid-template-columns: repeat(5, 1fr);">
  <button class="secondary" onclick="openFolder('original')">원본 PDF 폴더</button>
  <button class="secondary" onclick="openFolder('solution')">손풀이 PDF 폴더</button>
  <button class="secondary" onclick="openFolder('csv')">CSV 폴더</button>
  <button onclick="processNewFiles()">신규 파일 포함 처리</button>
  <button onclick="loadSummary()">결과 새로고침</button>
</section>
    <section class="toolbar">
      <div><label for="searchInput">검색</label><input id="searchInput" type="text" placeholder="학교명, 과목, 회차 검색" /></div>
      <div><label for="yearFilter">입학연도</label><select id="yearFilter"><option value="">전체</option></select></div>
      <div><label for="periodFilter">실행시기</label><select id="periodFilter"><option value="">전체</option></select></div>
      <div><label for="solutionFilter">손풀이</label><select id="solutionFilter"><option value="">전체</option><option value="등록완료">등록완료</option><option value="미등록">미등록</option></select></div>
      <button onclick="loadSummary()">새로고침</button>
    </section>
    <section class="stats"><div class="stat"><div class="label">조회 건수</div><div class="value" id="statCount">-</div></div><div class="stat"><div class="label">평균 정답률</div><div class="value" id="statAvg">-</div></div><div class="stat"><div class="label">손풀이 등록</div><div class="value" id="statSolution">-</div></div><div class="stat"><div class="label">활용기록</div><div class="value" id="statUsage">-</div></div></section>
    <section id="resultArea" class="list"><div class="loading">데이터를 불러오는 중입니다.</div></section>
  </main>
  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header"><div><h3 id="modalTitle">상세 리포트</h3><div class="sub" id="modalSub"></div></div><button class="close-btn" onclick="hideModal()">×</button></div><div id="modalContent" class="report">불러오는 중입니다.</div></div></div>
<script>
const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzQhx7OLITejYZU4j2wF5EynvGCGJfo-EhCjIlgN4bTKlEdoxaUgv7SQ5PFZEVDGi4FKQ/exec';
let allRows=[];let filteredRows=[];
document.addEventListener('DOMContentLoaded',()=>{['searchInput','yearFilter','periodFilter','solutionFilter'].forEach(id=>{document.getElementById(id).addEventListener(id==='searchInput'?'input':'change',render)});loadSummary()});
function jsonp(url){return new Promise((resolve,reject)=>{const callbackName='jsonpCallback_'+Date.now()+'_'+Math.floor(Math.random()*100000);window[callbackName]=data=>{delete window[callbackName];script.remove();resolve(data)};const script=document.createElement('script');const separator=url.includes('?')?'&':'?';script.src=url+separator+'callback='+callbackName;script.onerror=()=>{delete window[callbackName];script.remove();reject(new Error('API 호출 실패'))};document.body.appendChild(script)})}
async function loadSummary(){const area=document.getElementById('resultArea');area.innerHTML='<div class="loading">데이터를 불러오는 중입니다.</div>';try{if(API_BASE_URL.includes('PASTE_APPS_SCRIPT_WEBAPP_URL_HERE'))throw new Error('index.html 안의 API_BASE_URL을 Apps Script 웹앱 URL로 바꿔야 합니다.');const res=await jsonp(`${API_BASE_URL}?action=summary`);if(!res.ok)throw new Error(res.error||'API 오류');allRows=res.data||[];buildFilters(allRows);render()}catch(err){area.innerHTML=`<div class="error">데이터를 불러오지 못했습니다.<br>${escapeHtml(err.message)}</div>`}}
function buildFilters(rows){const yearSelect=document.getElementById('yearFilter');const periodSelect=document.getElementById('periodFilter');const currentYear=yearSelect.value;const currentPeriod=periodSelect.value;const years=unique(rows.map(r=>r.입학연도).filter(Boolean)).sort();const periods=unique(rows.map(r=>r.실행시기명).filter(Boolean));yearSelect.innerHTML='<option value="">전체</option>'+years.map(y=>`<option value="${escapeAttr(y)}">${escapeHtml(y)}입학</option>`).join('');periodSelect.innerHTML='<option value="">전체</option>'+periods.map(p=>`<option value="${escapeAttr(p)}">${escapeHtml(p)}</option>`).join('');yearSelect.value=currentYear;periodSelect.value=currentPeriod}
function render(){const q=document.getElementById('searchInput').value.trim().toLowerCase();const year=document.getElementById('yearFilter').value;const period=document.getElementById('periodFilter').value;const solution=document.getElementById('solutionFilter').value;filteredRows=allRows.filter(row=>{const haystack=[row.시험명,row.실시명,row.회차,row.오답률TOP,row.해설우선순위,row.활용기록].join(' ').toLowerCase();if(q&&!haystack.includes(q))return false;if(year&&String(row.입학연도)!==String(year))return false;if(period&&String(row.실행시기명)!==String(period))return false;if(solution&&String(row.손풀이상태)!==String(solution))return false;return true});filteredRows.sort((a,b)=>{const ya=Number(a.입학연도||0),yb=Number(b.입학연도||0);if(ya!==yb)return yb-ya;const pa=String(a.실행시기코드||''),pb=String(b.실행시기코드||'');if(pa!==pb)return pa.localeCompare(pb);return extractRoundNumber(a.회차)-extractRoundNumber(b.회차)});updateStats(filteredRows);renderCards(filteredRows)}
function updateStats(rows){const count=rows.length;const avgValues=rows.map(r=>Number(r.평균문항정답률)).filter(Number.isFinite);const avg=avgValues.length?(avgValues.reduce((a,b)=>a+b,0)/avgValues.length).toFixed(1):'-';const solutionCount=rows.filter(r=>r.손풀이상태==='등록완료').length;const usageCount=rows.reduce((sum,r)=>sum+Number(r.활용횟수||0),0);document.getElementById('statCount').textContent=count;document.getElementById('statAvg').textContent=avg==='-'?'-':`${avg}%`;document.getElementById('statSolution').textContent=`${solutionCount}/${count}`;document.getElementById('statUsage').textContent=usageCount}
function renderCards(rows){const area=document.getElementById('resultArea');if(!rows.length){area.innerHTML='<div class="empty">조건에 맞는 분석 결과가 없습니다.</div>';return}area.innerHTML=rows.map(row=>`<article class="card"><h2>${escapeHtml(row.시험명||'-')}</h2><div class="sub">${escapeHtml(row.실시명||'-')}</div><div class="badges"><span class="badge blue">${escapeHtml(row.입학연도||'-')}입학</span><span class="badge">${escapeHtml(row.실행시기명||'-')}</span><span class="badge">${escapeHtml(row.회차||'-')}</span><span class="badge green">응시 ${escapeHtml(row.응시자수||'-')}명</span><span class="badge ${rateBadgeClass(row.평균문항정답률)}">평균 ${escapeHtml(row.평균문항정답률||'-')}%</span><span class="badge ${row.손풀이상태==='등록완료'?'green':'orange'}">손풀이 ${escapeHtml(row.손풀이상태||'-')}</span><span class="badge orange">1컷 ${escapeHtml(row.일컷||'-')}</span></div><div class="summary-grid"><div class="box"><div class="box-title">오답률 TOP</div><div class="box-content">${escapeHtml(row.오답률TOP||'-')}</div></div><div class="box"><div class="box-title">해설 우선순위</div><div class="box-content">${escapeHtml(row.해설우선순위||'-')}</div></div><div class="box"><div class="box-title">함정 후보</div><div class="box-content">${escapeHtml(row.함정후보||'-')}</div></div><div class="box"><div class="box-title">활용기록</div><div class="box-content">${escapeHtml(row.활용기록||'없음')}</div></div></div><div class="actions">${row.손풀이링크?`<a href="${escapeAttr(row.손풀이링크)}" target="_blank" rel="noopener">손풀이 열기</a>`:''}<button class="secondary" onclick="showDetail('${escapeAttr(row.실시ID)}')">상세 리포트</button></div></article>`).join('')}
async function showDetail(runId){const modal=document.getElementById('modalBackdrop');const title=document.getElementById('modalTitle');const sub=document.getElementById('modalSub');const content=document.getElementById('modalContent');modal.style.display='flex';title.textContent='상세 리포트';sub.textContent=runId;content.textContent='불러오는 중입니다.';try{const res=await jsonp(`${API_BASE_URL}?action=detail&runId=${encodeURIComponent(runId)}`);if(!res.ok)throw new Error(res.error||'상세 조회 오류');const data=res.data;title.textContent=data.시험명||'상세 리포트';sub.textContent=data.실시명||runId;content.textContent=data.리포트본문||'리포트 본문이 없습니다.'}catch(err){content.textContent='상세 리포트를 불러오지 못했습니다.\n'+err.message}}
function hideModal(){document.getElementById('modalBackdrop').style.display='none'}function closeModal(event){if(event.target.id==='modalBackdrop')hideModal()}function unique(arr){return[...new Set(arr.map(v=>String(v)))]}function extractRoundNumber(value){const m=String(value||'').match(/\d+/);return m?Number(m[0]):9999}function rateBadgeClass(rate){const n=Number(rate);if(!Number.isFinite(n))return'';if(n>=80)return'green';if(n>=65)return'orange';return'red'}function escapeHtml(value){return String(value??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;')}function escapeAttr(value){return escapeHtml(value)}
</script>
</body>
</html>
