<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배장윤T 수학연구소 실전테스트 분석</title>

  <style>
    :root {
      --bg: #fbfcfb;
      --card: #ffffff;
      --text: #1f2933;
      --muted: #6b7280;
      --border: #e5e9e4;
      --primary: #8bcf98;
      --primary-dark: #6bb97a;
      --primary-soft: #f1faf3;
      --mint: #edf8ef;
      --shadow: 0 8px 22px rgba(31, 41, 51, .055);
      --radius: 18px;
      --red: #c2413d;
      --green: #3f8f57;
      --orange: #b96b22;
      --ink: #1f2933;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: #ffffff;
      color: var(--text);
      padding: 26px 20px 28px;
      border-bottom: 1px solid var(--border);
    }

    .wrap {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-box {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: var(--primary-soft);
      border: 1px solid #cfe9d4;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 auto;
      box-shadow: 0 6px 16px rgba(124,191,138,.14);
    }

    .logo-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-fallback {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -.04em;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      letter-spacing: -.035em;
      line-height: 1.22;
    }

    header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .toolbar {
      margin: 22px auto;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      display: grid;
      gap: 10px;
      align-items: end;
    }

    .operation-toolbar { grid-template-columns: repeat(6, 1fr); }
    .filter-toolbar { grid-template-columns: 1.4fr .8fr .8fr .8fr auto; }

    label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 900;
    }

    input, select, button {
      width: 100%;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 11px;
      background: #fff;
      padding: 0 12px;
      font-size: 14px;
      color: var(--text);
    }

    input:focus, select:focus {
      outline: 2px solid rgba(82,119,91,.18);
      border-color: rgba(82,119,91,.48);
    }

    button {
      border: none;
      background: var(--primary);
      color: #fff;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
      box-shadow: 0 6px 14px rgba(124,191,138,.16);
    }

    button:hover { background: var(--primary-dark); }
    button.secondary { background: #ffffff; color: var(--ink); border: 1px solid var(--border); box-shadow: none; }
    button.secondary:hover { background: var(--primary-soft); }
    button.light {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    button.light:hover { background: var(--primary-soft); }
    button:disabled { opacity: .55; cursor: not-allowed; }

    .notice {
      margin: -8px auto 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid #b7e4bf;
      border-radius: 16px;
      padding: 15px;
      box-shadow: 0 6px 18px rgba(31,41,51,.035);
    }

    .stat .label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 900;
    }

    .stat .value {
      font-size: 24px;
      font-weight: 950;
      margin-top: 4px;
      color: var(--ink);
    }

    .list {
      display: grid;
      gap: 14px;
      padding-bottom: 40px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-top: 3px solid #b7e4bf;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    .card h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: -.035em;
      color: #26382b;
    }

    .sub {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 27px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      background: #fafafa;
      color: #374151;
      border: 1px solid var(--border);
    }

    .blue { background: #eef6ff; color: #1d4ed8; border-color: #dbeafe; }
    .red { background: #fef2f2; color: var(--red); border-color: #fee2e2; }
    .green { background: var(--primary-soft); color: var(--green); border-color: #cfe9d4; }
    .orange { background: #fff7ed; color: var(--orange); border-color: #fed7aa; }

    .summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 15px;
    }

    .box {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px;
      min-height: 78px;
    }

    .box-title {
      font-size: 12px;
      color: var(--muted);
      font-weight: 950;
      margin-bottom: 6px;
    }

    .box-content {
      font-size: 13px;
      line-height: 1.58;
      white-space: pre-wrap;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 15px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .actions button,
    .actions a {
      width: auto;
      height: 37px;
      border-radius: 10px;
      padding: 0 13px;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      font-weight: 900;
    }

    .actions a {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
    }

    .loading, .empty, .error {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      color: var(--muted);
      box-shadow: var(--shadow);
    }

    .error { color: var(--red); }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(31, 41, 51, .54);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .modal {
      width: min(920px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 24px 70px rgba(0,0,0,.25);
      padding: 20px;
      border: 1px solid var(--border);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      margin-bottom: 14px;
    }

    .modal h3 {
      margin: 0;
      font-size: 20px;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      background: #f3f7f5;
      color: #111827;
      border-radius: 50%;
      padding: 0;
      flex: 0 0 auto;
      box-shadow: none;
    }

    .report {
      white-space: pre-wrap;
      line-height: 1.65;
      font-size: 14px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 15px;
    }

    @media (max-width: 980px) {
      .operation-toolbar { grid-template-columns: 1fr 1fr 1fr; }
      .filter-toolbar { grid-template-columns: 1fr 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .summary-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 560px) {
      .operation-toolbar, .filter-toolbar, .stats { grid-template-columns: 1fr; }
      h1 { font-size: 22px; }
      .brand { align-items: flex-start; }
      .logo-box { width: 50px; height: 50px; border-radius: 14px; }
    }
  </style>
</head>

<body>
  <header>
    <div class="wrap">
      <div class="brand">
        <div class="logo-box">
          <img src="./logo.png" alt="배장윤T 수학연구소 로고" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';" />
          <div class="logo-fallback" style="display:none;">배T</div>
        </div>
        <div>
          <h1>배장윤T 수학연구소 실전테스트 분석 조회</h1>
          <p>PDF · CSV · 손풀이 · 활용기록 통합 운영 콘솔</p>
        </div>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar operation-toolbar">
      <button class="secondary" onclick="openFolder('original')">원본 PDF 폴더</button>
      <button class="secondary" onclick="openFolder('solution')">손풀이 PDF 폴더</button>
      <button class="secondary" onclick="openFolder('csv')">CSV 폴더</button>
      <button id="processButton" onclick="processNewFiles()">신규 파일 포함 처리</button>
      <button id="quickButton" onclick="quickReanalysis()">빠른 재분석</button>
      <button class="light" onclick="loadSummary()">결과 새로고침</button>
    </section>

    <p class="notice">
      로고는 이 파일과 같은 위치에 <b>logo.png</b>로 업로드하면 자동 표시됩니다.
      파일은 Drive 폴더에 직접 업로드한 뒤 <b>신규 파일 포함 처리</b>를 누르면 됩니다.
    </p>

    <section class="toolbar filter-toolbar">
      <div>
        <label for="searchInput">검색</label>
        <input id="searchInput" type="text" placeholder="학교명, 과목, 회차 검색" />
      </div>

      <div>
        <label for="yearFilter">입학연도</label>
        <select id="yearFilter">
          <option value="">전체</option>
        </select>
      </div>

      <div>
        <label for="periodFilter">실행시기</label>
        <select id="periodFilter">
          <option value="">전체</option>
        </select>
      </div>

      <div>
        <label for="solutionFilter">손풀이</label>
        <select id="solutionFilter">
          <option value="">전체</option>
          <option value="등록완료">등록완료</option>
          <option value="미등록">미등록</option>
        </select>
      </div>

      <button onclick="loadSummary()">새로고침</button>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="label">조회 건수</div>
        <div class="value" id="statCount">-</div>
      </div>

      <div class="stat">
        <div class="label">평균 점수</div>
        <div class="value" id="statAvgScore">-</div>
      </div>

      <div class="stat">
        <div class="label">손풀이 등록</div>
        <div class="value" id="statSolution">-</div>
      </div>

      <div class="stat">
        <div class="label">활용기록</div>
        <div class="value" id="statUsage">-</div>
      </div>
    </section>

    <section id="resultArea" class="list">
      <div class="loading">데이터를 불러오는 중입니다.</div>
    </section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <div>
          <h3 id="modalTitle">상세 리포트</h3>
          <div class="sub" id="modalSub"></div>
        </div>
        <button class="close-btn" onclick="hideModal()">×</button>
      </div>

      <div id="modalContent" class="report">불러오는 중입니다.</div>
    </div>
  </div>

  <script>
    const API_BASE_URL = 'https://script.google.com/macros/s/AKfycbzQhx7OLITejYZU4j2wF5EynvGCGJfo-EhCjIlgN4bTKlEdoxaUgv7SQ5PFZEVDGi4FKQ/exec';

    let allRows = [];
    let filteredRows = [];
    let webSettings = {};

    document.addEventListener('DOMContentLoaded', async () => {
      ['searchInput', 'yearFilter', 'periodFilter', 'solutionFilter'].forEach(id => {
        document.getElementById(id).addEventListener(id === 'searchInput' ? 'input' : 'change', render);
      });

      await loadSettings();
      await loadSummary();
    });

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callbackName = 'jsonpCallback_' + Date.now() + '_' + Math.floor(Math.random() * 100000);

        window[callbackName] = data => {
          delete window[callbackName];
          script.remove();
          resolve(data);
        };

        const script = document.createElement('script');
        const separator = url.includes('?') ? '&' : '?';
        script.src = url + separator + 'callback=' + callbackName;

        script.onerror = () => {
          delete window[callbackName];
          script.remove();
          reject(new Error('API 호출 실패'));
        };

        document.body.appendChild(script);
      });
    }

    async function loadSettings() {
      try {
        const res = await jsonp(`${API_BASE_URL}?action=settings`);

        if (!res.ok) throw new Error(res.error || '설정 조회 오류');

        webSettings = res.data || {};
      } catch (err) {
        console.warn('설정 조회 실패:', err.message);
        webSettings = {};
      }
    }

    function openFolder(type) {
      const urlMap = {
        original: webSettings.originalPdfFolderUrl,
        solution: webSettings.solutionPdfFolderUrl,
        csv: webSettings.omrCsvFolderUrl,
        result: webSettings.resultFolderUrl,
      };

      const url = urlMap[type];

      if (!url) {
        alert('폴더 URL을 불러오지 못했습니다. Apps Script 설정 탭의 폴더 ID를 확인해주세요.');
        return;
      }

      window.open(url, '_blank', 'noopener');
    }

    async function processNewFiles() {
      const ok = confirm(
        '신규 파일 포함 처리를 실행할까요?\n\n' +
        'Drive 폴더에 넣은 PDF/CSV/손풀이를 스캔하고 분석요약까지 갱신합니다.\n' +
        '처리 중에는 1~2분 정도 걸릴 수 있습니다.'
      );

      if (!ok) return;

      const area = document.getElementById('resultArea');
      const button = document.getElementById('processButton');

      button.disabled = true;
      button.textContent = '처리 중...';
      area.innerHTML = '<div class="loading">신규 파일 포함 처리 중입니다. 완료될 때까지 기다려주세요.</div>';

      try {
        const res = await jsonp(`${API_BASE_URL}?action=processNewFiles`);

        if (!res.ok) throw new Error(res.error || '처리 오류');

        alert(`${res.data.message}\n\n소요 시간: ${res.data.seconds}초`);
        await loadSummary();

      } catch (err) {
        area.innerHTML = `<div class="error">신규 파일 포함 처리 실패<br>${escapeHtml(err.message)}</div>`;
      } finally {
        button.disabled = false;
        button.textContent = '신규 파일 포함 처리';
      }
    }

    async function quickReanalysis() {
      const ok = confirm(
        '빠른 재분석을 실행할까요?\n\n' +
        '문항구성은 건드리지 않고 객관식 정답, CSV 분석, 리포트, 분석요약만 갱신합니다.'
      );

      if (!ok) return;

      const area = document.getElementById('resultArea');
      const button = document.getElementById('quickButton');

      button.disabled = true;
      button.textContent = '재분석 중...';
      area.innerHTML = '<div class="loading">빠른 재분석 중입니다. 완료될 때까지 기다려주세요.</div>';

      try {
        const res = await jsonp(`${API_BASE_URL}?action=quickReanalysis`);

        if (!res.ok) throw new Error(res.error || '재분석 오류');

        alert(`${res.data.message}\n\n소요 시간: ${res.data.seconds}초`);
        await loadSummary();

      } catch (err) {
        area.innerHTML = `<div class="error">빠른 재분석 실패<br>${escapeHtml(err.message)}</div>`;
      } finally {
        button.disabled = false;
        button.textContent = '빠른 재분석';
      }
    }

    async function loadSummary() {
      const area = document.getElementById('resultArea');
      area.innerHTML = '<div class="loading">데이터를 불러오는 중입니다.</div>';

      try {
        const res = await jsonp(`${API_BASE_URL}?action=summary`);

        if (!res.ok) throw new Error(res.error || 'API 오류');

        allRows = res.data || [];
        buildFilters(allRows);
        render();

      } catch (err) {
        area.innerHTML = `<div class="error">데이터를 불러오지 못했습니다.<br>${escapeHtml(err.message)}</div>`;
      }
    }

    function buildFilters(rows) {
      const yearSelect = document.getElementById('yearFilter');
      const periodSelect = document.getElementById('periodFilter');

      const currentYear = yearSelect.value;
      const currentPeriod = periodSelect.value;

      const years = unique(rows.map(r => r.입학연도).filter(Boolean)).sort();
      const periods = unique(rows.map(r => r.실행시기명).filter(Boolean));

      yearSelect.innerHTML = '<option value="">전체</option>' +
        years.map(y => `<option value="${escapeAttr(y)}">${escapeHtml(y)}입학</option>`).join('');

      periodSelect.innerHTML = '<option value="">전체</option>' +
        periods.map(p => `<option value="${escapeAttr(p)}">${escapeHtml(p)}</option>`).join('');

      yearSelect.value = currentYear;
      periodSelect.value = currentPeriod;
    }

    function render() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      const year = document.getElementById('yearFilter').value;
      const period = document.getElementById('periodFilter').value;
      const solution = document.getElementById('solutionFilter').value;

      filteredRows = allRows.filter(row => {
        const haystack = [
          row.시험명,
          row.실시명,
          row.회차,
          row.오답률TOP,
          row.해설우선순위,
          row.활용기록
        ].join(' ').toLowerCase();

        if (q && !haystack.includes(q)) return false;
        if (year && String(row.입학연도) !== String(year)) return false;
        if (period && String(row.실행시기명) !== String(period)) return false;
        if (solution && String(row.손풀이상태) !== String(solution)) return false;

        return true;
      });

      filteredRows.sort((a, b) => {
        const ya = Number(a.입학연도 || 0);
        const yb = Number(b.입학연도 || 0);

        if (ya !== yb) return yb - ya;

        const pa = String(a.실행시기코드 || '');
        const pb = String(b.실행시기코드 || '');

        if (pa !== pb) return pa.localeCompare(pb);

        return extractRoundNumber(a.회차) - extractRoundNumber(b.회차);
      });

      updateStats(filteredRows);
      renderCards(filteredRows);
    }

    function updateStats(rows) {
      const count = rows.length;

      const avgScoreValues = rows
        .map(r => Number(r.평균점수))
        .filter(Number.isFinite);

      const avgScore = avgScoreValues.length
        ? (avgScoreValues.reduce((a, b) => a + b, 0) / avgScoreValues.length).toFixed(1)
        : '-';

      const solutionCount = rows.filter(r => r.손풀이상태 === '등록완료').length;
      const usageCount = rows.reduce((sum, r) => sum + Number(r.활용횟수 || 0), 0);

      document.getElementById('statCount').textContent = count;
      document.getElementById('statAvgScore').textContent = avgScore === '-' ? '-' : `${avgScore}점`;
      document.getElementById('statSolution').textContent = `${solutionCount}/${count}`;
      document.getElementById('statUsage').textContent = usageCount;
    }

    function renderCards(rows) {
      const area = document.getElementById('resultArea');

      if (!rows.length) {
        area.innerHTML = '<div class="empty">조건에 맞는 분석 결과가 없습니다.</div>';
        return;
      }

      area.innerHTML = rows.map(row => {
        const scoreText = getScoreText(row);

        return `
          <article class="card">
            <h2>${escapeHtml(row.시험명 || '-')}</h2>
            <div class="sub">${escapeHtml(row.실시명 || '-')}</div>

            <div class="badges">
              <span class="badge blue">${escapeHtml(row.입학연도 || '-')}입학</span>
              <span class="badge">${escapeHtml(row.실행시기명 || '-')}</span>
              <span class="badge">${escapeHtml(row.회차 || '-')}</span>
              <span class="badge green">응시 ${escapeHtml(row.응시자수 || '-')}명</span>
              <span class="badge ${scoreBadgeClass(row.평균점수)}">평균 ${escapeHtml(scoreText)}</span>
              <span class="badge ${row.손풀이상태 === '등록완료' ? 'green' : 'orange'}">손풀이 ${escapeHtml(row.손풀이상태 || '-')}</span>
              <span class="badge orange">1컷 ${escapeHtml(row.일컷 || '-')}</span>
            </div>

            <div class="summary-grid">
              <div class="box">
                <div class="box-title">오답률 TOP</div>
                <div class="box-content">${escapeHtml(row.오답률TOP || '-')}</div>
              </div>

              <div class="box">
                <div class="box-title">해설 우선순위</div>
                <div class="box-content">${escapeHtml(row.해설우선순위 || '-')}</div>
              </div>

              <div class="box">
                <div class="box-title">함정 후보</div>
                <div class="box-content">${escapeHtml(row.함정후보 || '-')}</div>
              </div>

              <div class="box">
                <div class="box-title">활용기록</div>
                <div class="box-content">${escapeHtml(row.활용기록 || '없음')}</div>
              </div>
            </div>

            <div class="actions">
              ${row.손풀이링크 ? `<a href="${escapeAttr(row.손풀이링크)}" target="_blank" rel="noopener">손풀이 열기</a>` : ''}
              <button class="light" onclick="openCutModalSoon()">1컷 수정</button>
              <button class="light" onclick="openUsageModalSoon()">활용기록</button>
              <button class="secondary" onclick="showDetail('${escapeAttr(row.실시ID)}')">상세 리포트</button>
            </div>
          </article>
        `;
      }).join('');
    }

    function getScoreText(row) {
      if (row.평균점수 !== undefined && row.평균점수 !== null && row.평균점수 !== '') {
        const max = row.만점 ? `/${row.만점}` : '';
        return `${row.평균점수}${max}점`;
      }

      if (row.평균문항정답률 !== undefined && row.평균문항정답률 !== null && row.평균문항정답률 !== '') {
        return `${row.평균문항정답률}%`;
      }

      return '-';
    }

    function scoreBadgeClass(score) {
      const n = Number(score);

      if (!Number.isFinite(n)) return '';
      if (n >= 80) return 'green';
      if (n >= 65) return 'orange';

      return 'red';
    }

    function openCutModalSoon() {
      alert('1컷 수정 팝업은 다음 단계에서 연결합니다.');
    }

    function openUsageModalSoon() {
      alert('활용기록 팝업은 다음 단계에서 연결합니다.');
    }

    async function showDetail(runId) {
      const modal = document.getElementById('modalBackdrop');
      const title = document.getElementById('modalTitle');
      const sub = document.getElementById('modalSub');
      const content = document.getElementById('modalContent');

      modal.style.display = 'flex';
      title.textContent = '상세 리포트';
      sub.textContent = runId;
      content.textContent = '불러오는 중입니다.';

      try {
        const res = await jsonp(`${API_BASE_URL}?action=detail&runId=${encodeURIComponent(runId)}`);

        if (!res.ok) throw new Error(res.error || '상세 조회 오류');

        const data = res.data;

        title.textContent = data.시험명 || '상세 리포트';
        sub.textContent = data.실시명 || runId;
        content.textContent = data.리포트본문 || '리포트 본문이 없습니다.';

      } catch (err) {
        content.textContent = '상세 리포트를 불러오지 못했습니다.\n' + err.message;
      }
    }

    function hideModal() {
      document.getElementById('modalBackdrop').style.display = 'none';
    }

    function closeModal(event) {
      if (event.target.id === 'modalBackdrop') hideModal();
    }

    function unique(arr) {
      return [...new Set(arr.map(v => String(v)))];
    }

    function extractRoundNumber(value) {
      const m = String(value || '').match(/\d+/);
      return m ? Number(m[0]) : 9999;
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }
  </script>
</body>
</html>
